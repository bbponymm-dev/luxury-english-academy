<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#a8927d">
  <meta name="description" content="Mobile English practice for luxury handbag livestream hosts.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Luxury English">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
  <title>Luxury English Academy</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Luxury Livestream</p>
        <h1 id="viewTitle">Today</h1>
      </div>
      <button class="icon-btn" id="installBtn" aria-label="Install app" title="Install app" hidden>↧</button>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-item active" data-view="today"><span>⌂</span><small>Today</small></button>
      <button class="nav-item" data-view="cards"><span>◇</span><small>Cards</small></button>
      <button class="nav-item" data-view="explore"><span>▦</span><small>Explore</small></button>
      <button class="nav-item" data-view="quiz"><span>✓</span><small>Quiz</small></button>
      <button class="nav-item" data-view="live"><span>◉</span><small>Practice</small></button>
      <button class="nav-item" data-view="phone"><span>↗</span><small>Phone</small></button>
    </nav>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
